name: Benchmarks

on:
  pull_request:
    paths:
      - 'Sources/DuplicationDetector/**'
      - 'Sources/UnusedCodeDetector/**'
      - 'Sources/SwiftStaticAnalysisCore/**'
      - 'Sources/SymbolLookup/**'
      - 'Sources/swa-bench/**'
      - 'bench/**'
      - 'Package.swift'
      - '.github/workflows/benchmarks.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  bench:
    name: Run benchmarks
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode toolchain
        run: sudo xcode-select -s /Applications/Xcode_16.app || true

      - name: Build release
        run: swift build -c release --product swa-bench

      # Six scenarios run end-to-end (incl. duplicates-semantic, which
      # was missing pre-0.3.0-α.3 per audit F-15). The committed
      # baselines under bench/baselines/<scenario>.json gate the
      # comparison step below.
      - name: Run benchmark scenarios
        run: |
          set -euo pipefail
          mkdir -p .bench
          FIXTURE=Sources
          for scenario in duplicates-exact duplicates-near duplicates-semantic unused-simple unused-reachability symbol-lookup; do
            echo "::group::$scenario"
            swift run -c release swa-bench "$scenario" "$FIXTURE" \
              --warmup 1 --iterations 3 \
              --statistical \
              --output ".bench/${scenario}.json"
            jq '{scenario, wallSecondsMean, wallSecondsP99, peakRSSBytesMean}' ".bench/${scenario}.json"
            echo "::endgroup::"
          done

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-${{ github.sha }}
          path: .bench/

      # The actual gate. `compare.sh` exits non-zero when any scenario
      # exceeds its regression thresholds (mean +10% by default, p99
      # +25%). Per-scenario overrides live in
      # bench/baselines/<scenario>.thresholds.json.
      - name: Compare to baselines and gate
        id: compare
        run: |
          set -euo pipefail
          ./bench/compare.sh .bench bench/baselines | tee .bench/summary.md
          status=${PIPESTATUS[0]}
          echo "compare_exit=$status" >> "$GITHUB_OUTPUT"
          exit "$status"

      - name: Summarise into PR comment
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          {
            echo "### Benchmark Results"
            echo ""
            if [[ -f .bench/summary.md ]]; then
              cat .bench/summary.md
            else
              echo "_compare.sh produced no summary; check the workflow log._"
            fi
            echo ""
            echo "_Fixture: \`Sources/\` of this PR. 1 warm-up, 3 iterations._"
            echo "_Baselines under \`bench/baselines/\`; refresh via the_"
            echo "_\`refresh-baselines\` workflow when an intentional perf shift lands._"
          } > .bench/pr-comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file .bench/pr-comment.md
